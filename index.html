<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>alexeykasp about me</title>
        <link rel="stylesheet" href="styles.css">
        <script src="images.js" defer></script>
        <script>
            function adjustLayout() {
                const body = document.body;
                const html = document.documentElement;
    
                const height = Math.max(body.scrollHeight, body.offsetHeight, 
                                        html.clientHeight, html.scrollHeight, html.offsetHeight);
    
                if (height > window.innerHeight) {
                    document.body.style.minHeight = height + 'px';
                }
            }
    
            window.addEventListener('load', adjustLayout);
            window.addEventListener('resize', adjustLayout);
        </script>
    </head>
<body>
    <div class="container">
        <div class="column">
            <img class="avatar" id="avatar" alt="Avatar">
            <div class="name">alexeykasp</div>
            <h1>Обо мне</h1>
            <p>Здесь ты можешь найти информацию обо мне и мои Соц.сети.</p>
            <p>Нажми на меню рядом, чтобы узнать больше.</p>
        </div>
        <div class="column">
            <div class="accordion-item">
                <div class="accordion-header">Соц.сети</div>
                <div class="accordion-content">
                    <div class="social-icons">
                        <a href="https://t.me/alexeykasp" target="_blank">
                            <img id="Telegram" alt="Telegram">
                            <div class="tooltip">Telegram</div>
                        </a>
                        <a href="https://namemc.com/alexeykasp" target="_blank">
                            <img id="NameMC" alt="NameMC">
                            <div class="tooltip">NameMC</div>
                        </a>
                        <a href="https://guns.lol/frst" target="_blank">
                            <img id="Guns.lol" alt="Guns.lol">
                            <div class="tooltip">Guns.lol</div>
                        </a>
                        <a href="https://steamcommunity.com/id/alexeykasp" target="_blank">
                            <img id="Steam" alt="Steam">
                            <div class="tooltip">Steam</div>
                        </a>
                        </a>
                    </div>
                </div>
            </div>
            <div class="accordion-item">
                <div class="accordion-header">ip</div>
                <div class="accordion-content"> 
                    <!-- Контейнеры для данных -->
                    <div id="ip-address"></div>
                    <div id="country-code"></div>
                    <div id="time-zone"></div>
            
                    <!-- Общий скрипт для запроса данных -->
                    <script>
                        function handleIPResponse(data) {
                            // Очищаем таймер при успешном ответе
                            clearTimeout(ipRequestTimeout);
                            
                            // Скрипт 1: Обработка страны
                            if(data?.country) {
                                document.getElementById('country-code').textContent = 
                                    `Страна: ${data.country}`;
                            }
            
                            // Скрипт 2: Обработка часового пояса
                            if(data?.timezone) {
                                const timezoneParts = data.timezone.split('/');
                                document.getElementById('time-zone').textContent = 
                                    `Часовой пояс: ${timezoneParts[timezoneParts.length - 1]}`;
                            }
            
                            // Обработка IP
                            if(data?.ip) {
                                document.getElementById('ip-address').textContent = 
                                    `IP: ${data.ip}`;
                            }
                        }
                    </script>
            
                    <!-- Скрипт инициализации запроса -->
                    <script>
                        let ipRequestTimeout;
                        
                        const script = document.createElement('script');
                        script.src = 'https://ipinfo.io/json?callback=handleIPResponse';
                        document.body.appendChild(script);
            
                        // Таймаут для обработки ошибок
                        ipRequestTimeout = setTimeout(() => {
                            const containers = document.querySelectorAll('#ip-address, #country-code, #time-zone');
                            containers.forEach(container => {
                                if(container.innerHTML.trim() === '') {
                                    container.textContent = 'Данные недоступны';
                                }
                            });
                        }, 3000);
                    </script>
                </div>
            </div>
        </div>
    </div>
    <script src="accordion.js"></script>
</body>
</html>
