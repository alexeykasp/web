<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Колесо Фортуны</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #121212;
            color: #e0e0e0;
        }
        
        .container {
            display: flex;
            flex: 1;
            gap: 20px;
        }
        
        .left-panel {
            flex: 1;
            padding: 20px;
            background-color: #1e1e1e;
            border-radius: 10px;
        }
        
        .right-panel {
            flex: 1;
            padding: 20px;
            background-color: #1e1e1e;
            border-radius: 10px;
        }
        
        .wheel-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0 auto;
            max-width: 400px;
            position: relative;
        }
        
        .wheel {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background-color: #333;
            overflow: hidden;
            transition: transform 5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            margin: 30px auto;
        }
        
        .wheel-section {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: bottom right;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
            font-weight: bold;
            text-align: center;
        }
        
        .wheel-section span {
            transform: rotate(45deg);
            max-width: 80px;
            word-wrap: break-word;
            font-size: 12px;
        }
        
        .spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            background-color: #e0e0e0;
            border-radius: 50%;
            z-index: 10;
        }
        
        /* Указатель над колесом */
        .pointer-container {
            position: relative;
            width: 300px;
            height: 40px;
            margin-bottom: -20px; /* Смещаем указатель над колесом */
            z-index: 20;
        }
        
        .pointer {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 40px;
            background-color: #ff5252;
            clip-path: polygon(0 0, 100% 0, 50% 100%);
        }
        
        button {
            padding: 10px 15px;
            margin: 10px 0;
            background-color: #2c2c2c;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 5px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #3c3c3c;
        }
        
        input[type="text"] {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: #e0e0e0;
            border-radius: 5px;
        }
        
        .preset-list {
            margin-top: 20px;
        }
        
        .preset-item {
            margin-bottom: 10px;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #2c2c2c;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }
        
        .custom-options, .result-actions {
            margin-top: 20px;
        }
        
        .option-item {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .option-item button {
            margin-left: 10px;
            padding: 5px 10px;
            background-color: #3c1414;
        }
        
        h1, h2, h3 {
            color: #bb86fc;
        }
    </style>
</head>
<body>
    <h1>Колесо Фортуны</h1>
    
    <div class="container">
        <div class="left-panel">
            <h2>Предустановленные варианты</h2>
            
            <div class="preset-list">
                <div class="preset-item">
                    <input type="checkbox" id="preset1" class="preset-checkbox" data-options="test1,test2,test3,test4,test5">
                    <label for="preset1">test1</label>
                </div>
                
                <div class="preset-item">
                    <input type="checkbox" id="preset2" class="preset-checkbox" data-options="test1,test2,test3,test4,test5">
                    <label for="preset2">test2</label>
                </div>
            </div>
            
            <div id="active-options">
                <h3>Активные варианты</h3>
                <div id="options-list"></div>
            </div>
        </div>
        
        <div class="wheel-container">
            <!-- Указатель над колесом -->
            <div class="pointer-container">
                <div class="pointer"></div>
            </div>
            
            <div class="wheel" id="wheel">
                <div class="spinner"></div>
            </div>
            
            <button id="spin-button">Крутить колесо</button>
            
            <div class="result" id="result" style="display: none;">
                <p>Результат: <span id="result-value"></span></p>
                <div class="result-actions">
                    <button id="keep-result">Оставить</button>
                    <button id="remove-result">Удалить</button>
                </div>
            </div>
        </div>
        
        <div class="right-panel">
            <h2>Добавить свои варианты</h2>
            
            <div class="custom-options">
                <input type="text" id="new-option" placeholder="Введите вариант">
                <button id="add-option">Добавить</button>
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const wheel = document.getElementById('wheel');
            const spinButton = document.getElementById('spin-button');
            const resultDiv = document.getElementById('result');
            const resultValue = document.getElementById('result-value');
            const keepResultButton = document.getElementById('keep-result');
            const removeResultButton = document.getElementById('remove-result');
            const newOptionInput = document.getElementById('new-option');
            const addOptionButton = document.getElementById('add-option');
            const optionsList = document.getElementById('options-list');
            const presetCheckboxes = document.querySelectorAll('.preset-checkbox');
            
            let options = [];
            let spinning = false;
            let currentResult = null;
            let currentRotation = 0;
            
            // Обработчики для предустановленных вариантов
            presetCheckboxes.forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    const presetOptions = this.dataset.options.split(',');
                    
                    if (this.checked) {
                        // Добавляем варианты из предустановленного списка
                        presetOptions.forEach(option => {
                            if (!options.includes(option)) {
                                options.push(option);
                            }
                        });
                    } else {
                        // Удаляем варианты из предустановленного списка
                        options = options.filter(option => !presetOptions.includes(option));
                    }
                    
                    updateWheel();
                    updateOptionsList();
                });
            });
            
            // Добавление своего варианта
            addOptionButton.addEventListener('click', function() {
                const newOption = newOptionInput.value.trim();
                
                if (newOption && !options.includes(newOption)) {
                    options.push(newOption);
                    newOptionInput.value = '';
                    updateWheel();
                    updateOptionsList();
                }
            });
            
            // Обработка нажатия Enter в поле ввода
            newOptionInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    addOptionButton.click();
                }
            });
            
            // Вращение колеса
            spinButton.addEventListener('click', function() {
                if (spinning || options.length < 2) return;
                
                spinning = true;
                resultDiv.style.display = 'none';
                
                const rotations = 5; // Количество полных оборотов
                const degreesPerOption = 360 / options.length;
                
                // Расчет угла для остановки колеса
                // Мы хотим, чтобы после остановки колеса, вариант, который находится под указателем (сверху),
                // был результатом. Указатель находится на 270 градусах (сверху)
                const targetPosition = 270;
                
                // Выбираем случайный вариант
                const randomIndex = Math.floor(Math.random() * options.length);
                
                // Рассчитываем угол поворота так, чтобы выбранный вариант оказался под указателем
                const sectionAngle = randomIndex * degreesPerOption;
                const targetAngle = targetPosition - sectionAngle;
                
                // Добавляем полные обороты и нормализуем угол
                const totalRotation = rotations * 360 + targetAngle;
                
                // Сохраняем текущее положение колеса и добавляем новый поворот
                const finalRotation = currentRotation + totalRotation;
                currentRotation = finalRotation % 360;
                
                wheel.style.transform = `rotate(${finalRotation}deg)`;
                
                setTimeout(() => {
                    spinning = false;
                    
                    // Определяем, какой вариант оказался под указателем
                    // Указатель находится сверху (270 градусов)
                    const pointerPosition = 270;
                    
                    // Вычисляем текущее положение колеса в градусах (0-360)
                    const currentWheelPosition = finalRotation % 360;
                    
                    // Вычисляем, какой сектор находится под указателем
                    // Нам нужно учесть, что колесо вращается по часовой стрелке
                    const sectorIndex = Math.floor(((360 - currentWheelPosition + pointerPosition) % 360) / degreesPerOption);
                    
                    // Получаем результат
                    currentResult = options[sectorIndex % options.length];
                    
                    resultValue.textContent = currentResult;
                    resultDiv.style.display = 'block';
                }, 5000); // Время вращения колеса
            });
            
            // Оставить результат
            keepResultButton.addEventListener('click', function() {
                resultDiv.style.display = 'none';
                currentResult = null;
            });
            
            // Удалить результат
            removeResultButton.addEventListener('click', function() {
                if (currentResult) {
                    options = options.filter(option => option !== currentResult);
                    updateWheel();
                    updateOptionsList();
                    resultDiv.style.display = 'none';
                    currentResult = null;
                }
            });
            
            // Обновление колеса
            function updateWheel() {
                wheel.innerHTML = '<div class="spinner"></div>';
                
                if (options.length > 0) {
                    const degreesPerOption = 360 / options.length;
                    
                    options.forEach((option, index) => {
                        const section = document.createElement('div');
                        section.className = 'wheel-section';
                        section.style.transform = `rotate(${index * degreesPerOption}deg)`;
                        section.style.backgroundColor = getRandomColor(index);
                        
                        const text = document.createElement('span');
                        text.textContent = option;
                        section.appendChild(text);
                        
                        wheel.appendChild(section);
                    });
                }
            }
            
            // Обновление списка вариантов
            function updateOptionsList() {
                optionsList.innerHTML = '';
                
                options.forEach(option => {
                    const item = document.createElement('div');
                    item.className = 'option-item';
                    
                    const text = document.createElement('span');
                    text.textContent = option;
                    item.appendChild(text);
                    
                    const removeButton = document.createElement('button');
                    removeButton.textContent = 'Удалить';
                    removeButton.addEventListener('click', function() {
                        options = options.filter(o => o !== option);
                        updateWheel();
                        updateOptionsList();
                    });
                    item.appendChild(removeButton);
                    
                    optionsList.appendChild(item);
                });
            }
            
            // Генерация случайного цвета в темных оттенках
            function getRandomColor(index) {
                const colors = [
                    '#3c1414', '#143c14', '#14143c', '#3c3c14', '#3c143c',
                    '#2d2d2d', '#1f3d7a', '#7a1f3d', '#3d7a1f', '#7a3d1f'
                ];
                return colors[index % colors.length];
            }
            
            // Инициализация
            updateWheel();
        });
    </script>
</body>
</html>
